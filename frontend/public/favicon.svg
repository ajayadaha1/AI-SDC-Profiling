<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Solid dark background -->
  <rect width="32" height="32" rx="6" fill="#0f1b2d"/>

  <!-- Bold CPU chip outline -->
  <rect x="6" y="6" width="20" height="20" rx="3" stroke="#00bfa5" stroke-width="2" fill="none"/>

  <!-- Thick pins - top/bottom -->
  <line x1="12" y1="3" x2="12" y2="6" stroke="#00bfa5" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="3" x2="20" y2="6" stroke="#00bfa5" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="26" x2="12" y2="29" stroke="#00bfa5" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="26" x2="20" y2="29" stroke="#00bfa5" stroke-width="2" stroke-linecap="round"/>

  <!-- Thick pins - left/right -->
  <line x1="3" y1="12" x2="6" y2="12" stroke="#00bfa5" stroke-width="2" stroke-linecap="round"/>
  <line x1="3" y1="20" x2="6" y2="20" stroke="#00bfa5" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="12" x2="29" y2="12" stroke="#00bfa5" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="20" x2="29" y2="20" stroke="#00bfa5" stroke-width="2" stroke-linecap="round"/>

  <!-- Bold heartbeat pulse -->
  <polyline
    points="9,16 13,16 14.5,11 16.5,21 18.5,10 20,16 23,16"
    stroke="#00e5ff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Big red fault dot -->
  <circle cx="18.5" cy="10" r="3" fill="#ff1744"/>
</svg>
